<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Vocal Academy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background: #f8f9fe;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .logo-wrap {
      width: 90px;
      height: 90px;
      margin: 0 auto 32px;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .icon-wifi {
      font-size: 4rem;
      margin-bottom: 16px;
      display: block;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a1a2e;
    }

    p {
      font-size: 1rem;
      color: #6b7280;
      line-height: 1.6;
      max-width: 380px;
      margin: 0 auto 32px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #1a1a2e;
      color: white;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn:hover { background: #2d7d7d; }

    .multilang {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: 0.6;
      font-size: 0.85rem;
    }

    .multilang span[dir="rtl"] {
      font-family: 'Noto Naskh Arabic', serif;
    }
  </style>
</head>
<body>

  <span class="icon-wifi">📡</span>

  <h1>You're Offline</h1>
  <p>
    It looks like you've lost your internet connection. Please check your network and try again.
    Some previously visited pages may still be available.
  </p>

  <button class="btn" onclick="window.location.reload()">
    🔄 Try Again
  </button>

  <div class="multilang">
    <span dir="rtl">شما آفلاین هستید. لطفاً اتصال اینترنت خود را بررسی کنید.</span>
    <span dir="rtl">تاسو آفلاین یاست. مهرباني وکړئ خپل انټرنېټ وګورئ.</span>
  </div>

</body>
</html>
